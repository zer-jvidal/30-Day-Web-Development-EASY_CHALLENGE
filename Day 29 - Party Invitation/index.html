<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Invitation</title>
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Signika:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
    <img src="pex.jpg" alt="Party!">
    <header>
        <h1>Party Invitation</h1>
        <p>Join us for a night of fun and games!</p>
    </header>
    <main>
        <section>
            <h2>Event Details</h2>
            <p>Date: <span>January 26, 2026</span></p>
            <p>Time: <span>9:00 PM</span></p>
            <p>Location: <span>Sydney, Australia</span></p>
        </section>
    </main>
<hr>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="guests" id="guests">Number of Guests:</label>
        <input type="number" id="guests" name="guests" min="1" required>

        <label for="come" id="come">Are you coming?</label>
        <input type="radio" id="yes" name="coming" value="yes" required>
        <label for="yes" id="yes">Yes</label>
        <input type="radio" id="no" name="coming" value="no" required>
        <label for="no" id="no">No</label>

        <button type="submit" id="submit">Submit</button>
    </form>
    </div>

</body>
</html>

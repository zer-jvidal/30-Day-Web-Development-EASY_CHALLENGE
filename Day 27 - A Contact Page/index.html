<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Contact Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Signika:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./stylesheet.css">
</head>

<body>
    <div class="container">
    <section id="contact-info">
        <div class="personal-details">
        <h1>Get in Touch</h1>
            <h2>I'd like to hear from you.</h2>
                <p>If you have inquiries, feel free to reach out.</p>
        </div>
    </section>

    <section id="contact-form">
        <div class="form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Your Name">
        <br>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="E-mail" placeholder="Your E-mail">
        <br>
        <label for="message">Message:</label>
        <textarea id="message" name="message" placeholder="Your Message" maxlength="200" rows="5" cols="40"></textarea>
        <button type="submit">Send Message</button>
        </div>
        </div>
    </section>
